# Default configurations for KL-GAN TPU

seed: 42

# Training params
batch_size_per_device: 256
epochs: 500
lr_gen: 0.0002
lr_disc: 0.00005
beta1: 0.5
beta2: 0.999
latent_dim: 128
loss_type: "manifold"
manifold_proj_dim: 16
lambda_contrastive: 1.0
lambda_decorr: 1.0
lambda_cov: 1.0
sinkhorn_epsilon: 0.05
sinkhorn_max_iter: 15
lambda_div: 0.5
diversity_temperature: 0.5

# Model params
image_size: 32
channels: 16
latent_clip_value: 10.0
latent_npy_path: "/kaggle/input/datasets/sautkin/ffhq-sd3-5-vae-repa-e-latents-256/ffhq_latents_32x32x16.npy"

use_sn: false  # legacy; discriminator ignores this flag
use_minibatch_discrimination: false
num_kernels_mbd: 100
kernel_dim_mbd: 5

gen_features: 128
gen_depth: 7
gen_mapping_dim: 512

# Dtype: float32 | bfloat16 (weights/activations for conv/linear; BN uses float32)
network_dtype: bfloat16

# JAX matmul/dot precision only (not "entire program float32"). Common: default | high | float32
jax_matmul_precision: default

# W&B
wandb_project: "KL-GAN-TPU"
wandb_run_name: "default_run"

# Evaluation
eval_every_epochs: 5
fid_every_epochs: 50
num_fid_samples: 10000